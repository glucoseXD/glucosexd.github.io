---
layout: default
title: Blog
---

<h1>Posts</h1>
<ul class="post-list">
    {% for post in site.posts %}
    <li>
        <span class="post-date">{{ post.date | date: "%B %d, %Y" }}</span>
        <h3>
            <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        </h3>
        <p>{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
    </li>
    {% endfor %}
</ul>
